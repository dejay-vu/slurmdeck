name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  commit-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
      - name: Install Commitizen
        run: python -m pip install "commitizen>=4.16.4"
      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="$BASE_SHA..HEAD"
          elif [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]] \
            && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            range="$BEFORE_SHA..HEAD"
          else
            range=""
          fi

          if [[ -n "$range" ]]; then
            mapfile -t commits < <(git rev-list --reverse "$range")
          else
            mapfile -t commits < <(git rev-list --reverse HEAD)
          fi

          if (( ${#commits[@]} == 0 )); then
            echo "No commits found to check." >&2
            exit 1
          fi

          for commit in "${commits[@]}"; do
            echo "Checking $commit"
            git show --no-patch --format=%B "$commit" > "$RUNNER_TEMP/commit-message"
            cz check --commit-msg-file "$RUNNER_TEMP/commit-message"
          done

  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Format check
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest -q

  distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check PyPI metadata and README rendering
        run: python -m twine check --strict dist/*
      - name: Check source distribution contents
        run: |
          python - <<'PY'
          import glob
          import tarfile

          [archive] = glob.glob("dist/*.tar.gz")
          with tarfile.open(archive, "r:gz") as source_dist:
              names = source_dist.getnames()
          required_suffixes = (
              "/LICENSE",
              "/README.md",
              "/CHANGELOG.md",
              "/CONTRIBUTING.md",
              "/SECURITY.md",
              "/docs/configuration.md",
              "/tests/unit/test_models.py",
              "/tests/tui/fixtures/runs-80-dark.svg",
          )
          for suffix in required_suffixes:
              assert any(name.endswith(suffix) for name in names), suffix
          assert not any("__pycache__" in name or name.endswith((".pyc", ".pyo")) for name in names)
          PY
      - name: Install and smoke-test the wheel
        run: |
          python -m venv /tmp/slurmdeck-wheel
          /tmp/slurmdeck-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/slurmdeck-wheel/bin/python -m pip check
          /tmp/slurmdeck-wheel/bin/slurmdeck --version
          /tmp/slurmdeck-wheel/bin/python - <<'PY'
          from importlib.resources import files

          import slurmdeck

          package = files("slurmdeck")
          assert slurmdeck.__version__ != "0+unknown"
          assert package.joinpath("rendering/templates/array.sbatch.j2").is_file()
          assert package.joinpath("tui/styles.tcss").is_file()
          PY
